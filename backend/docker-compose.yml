services:

  # PHP App
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        user: evenzo
        uid: 1000
    image: smartevent-app
    container_name: smartevent-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www:cached
      - smartevent-vendor:/var/www/vendor
    networks:
      - smartevent

  # Nginx Web Server
  web:
    image: nginx:alpine
    container_name: smartevent-web
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www:cached
      - smartevent-vendor:/var/www/vendor
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - smartevent

  # MySQL Database
  db:
    image: mysql:8.0
    container_name: smartevent-db
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_USER: ${DB_USERNAME}
    volumes:
      - smartevent-db:/var/lib/mysql
    networks:
      - smartevent
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-p${DB_PASSWORD}"]
      retries: 3
      timeout: 5s

  # Redis
  redis:
    image: redis:alpine
    container_name: smartevent-redis
    restart: unless-stopped
    networks:
      - smartevent

  # Mailpit
  mailpit:
    image: axllent/mailpit
    container_name: smartevent-mailpit
    restart: unless-stopped
    ports:
      - "8025:8025"
      - "1025:1025"
    networks:
      - smartevent

  # phpMyAdmin
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: smartevent-phpmyadmin
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      PMA_HOST: db
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
    networks:
      - smartevent

  # Node.js for Vite/NPM (React Frontend)
  node:
    image: node:20-alpine
    container_name: smartevent-node
    init: true
    working_dir: /var/www
    volumes:
      - ../frontend:/var/www:cached
      - smartevent-node-modules:/var/www/node_modules
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev"
    networks:
      - smartevent

networks:
  smartevent:
    driver: bridge

volumes:
  smartevent-db:
    driver: local
  smartevent-vendor:
    driver: local
  smartevent-node-modules:
    driver: local
